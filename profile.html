<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="profile.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <button class="menu-item" style="font-size: 12pt;"><img src="assets/dash.svg" alt="dash" width="20pt" style="padding-right: 5px; ">Dashboard</button>
            <button class="menu-item" style="font-size: 12pt;"><img src="assets/riw.svg" alt="dash" width="22pt" style="padding-right: 5px; ">Riwayat</button>
            <button class="menu-item" style="font-size: 12pt;"><img src="assets/sep.svg" alt="dash" width="22pt" style="padding-right: 5px; ">Daftar Sepeda</button>
            <button class="menu-item" style="font-size: 12pt;"><img src="assets/us.svg" alt="dash" width="22pt" style="padding-right: 5px; ">Daftar User</button>
            <button class="menu-item active" style="font-size: 12pt;"><img src="assets/pro.svg" alt="dash" width="22pt" style="padding-right: 5px; ">Profile</button>
        </nav>

        <!-- Content Area -->
        <main class="content profile-content">
    <div class="profile-header">
        <div class="avatar-placeholder">
            <!-- Tempat foto profil kamu -->
            <img src="assets/andi.svg" alt="Profile">
        </div>
        <h2>Andi Wijaya</h2>
        <p>25.01.04.005</p>
    </div>

    <div class="profile-details">
        <div class="detail-row">
            <span>Email</span>
            <span class="detail-value">andiwijaya@gmail.com</span>
        </div>
        <hr>
    </div>

    <button class="logout-btn">Log Out</button>

    <!-- Modal Custom -->
<div id="logoutModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-icon">⚠️</div>
        <h3>Yakin Log Out?</h3>
        <div class="modal-actions">
            <button id="confirmLogout" class="btn-logout">Log Out</button>
            <button id="cancelLogout" class="btn-cancel">Batal</button>
        </div>
    </div>
</div>
</main>
<script src="profile.js"></script>
</body>
</html>
